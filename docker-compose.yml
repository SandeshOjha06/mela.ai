version: "3.9"

services:
  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build: ./backend
    container_name: swarmy-backend
    env_file: ./backend/.env
    volumes:
      - chroma_data:/app/chroma_data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Vite React Frontend (Nginx) ─────────────────────────────
  frontend:
    build: ./frontend
    container_name: swarmy-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
